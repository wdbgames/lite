<!DOCTYPE html>
<html>
	<head>
		<title>WDB Games</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div id="navbar"></div>
		<div id="container"></div>
		<script src="main.js"></script>
		<script>
			document.body.dataset.theme = localStorage.getItem("theme") || "dark";

			const g_cache = {};
			const g_navbar = document.getElementById("navbar");
			const g_container = document.getElementById("container");
			const g_btn = [];
			let g_btnSelected = 0;

			async function fetchData(url) {
				if(g_cache[url]) {
					return g_cache[url];
				}

				const response = await fetch(url);
				const data = await response.json();
				g_cache[url] = data;
				return data;
			}

			function createBtn(id, title) {
				g_btn[id] = document.createElement("button");
				g_btn[id].textContent = title;
				g_btn[id].className = id === 0 ? "settings-button" : "button";
				g_btn[id].onclick = () => {
					if(g_btnSelected !== id) {
						loadBtn(id);
					}
				}
				g_navbar.appendChild(g_btn[id]);
			}

			function loadBtn(id) {
				g_container.textContent = "";
				g_container.className = id === 0 ? "settings-container" : "boxes-container";
				g_btnSelected = id;
				
				for(let i = 0; i < g_btn.length; ++i) {
					if(g_btnSelected === i) {
						g_btn[i].classList.add("active");
					} else {
						g_btn[i].classList.remove("active");
					}
				}
				
				switch(id) {
					case 0:
						loadSettings();
						break;
					case 1:
						loadWDBG();
						break;
					case 2:
						loadGN();
						break;
					case 3:
						loadCMG();
						break;
				}
			}

			function createBox(imgSrc, name, url) {
				const box = document.createElement("div");
				box.className = "box";

				const img = document.createElement("img");
				img.loading = "lazy";
				img.src = imgSrc;
				img.onerror = () => {
					img.src = "images/error.png";
				}
				box.appendChild(img);
				
				const a = document.createElement("a");
				a.textContent = name;
				a.href = url;
				a.target = "_blank";
				box.appendChild(a);
				
				g_container.appendChild(box);
			}

			function createSetting(name, item, placeholder, value) {
				const setting = document.createElement("div");
				setting.className = "setting";

				const title = document.createElement("p");
				title.textContent = name;
				setting.appendChild(title);

				const input = document.createElement("input");
				input.placeholder = placeholder;
				input.value = value;
				input.id = item;
				setting.appendChild(input);

				g_container.appendChild(setting);
			}

			async function loadSettings() {
				const settings = await fetchData("settings.json");

				settings.forEach(setting => {
					createSetting(setting.name, setting.item, setting.placeholder, localStorage.getItem(setting.item) || "");
				});

				const button = document.createElement("button");
				button.className = "button";
				button.textContent = "Save Settings";

				button.onclick = () => {
					settings.forEach(setting => {
						localStorage.setItem(setting.item, document.getElementById(setting.item).value);
					});
				};

				g_container.appendChild(button);
			}

			async function loadWDBG() {
				const data = await fetchData("embed.json");
				data.forEach(box => {
					createBox(`images/${box.id}.png`, box.title, `embed.html?t=0&id=${box.id}`);
				});

				// g_container.replaceChildren(fragment);
			}

			async function loadGN() {
				try {
					const zones = await fetchData("https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json");
					zones.forEach(zone => {
						const imgSrc = zone.cover.replace("{COVER_URL}", "https://cdn.jsdelivr.net/gh/gn-math/covers@main");
						createBox(imgSrc, zone.name, `embed.html?t=1&id=${zone.id}`)
					});
				} catch (error) {
					console.error(error);
				}
			}

			async function loadCMG() {
				try {
					const data = await fetchData("cmatgame_games_with_levels.json");
					data.game.forEach(game => {
						const imgSrc = game.si 
							? "https://www.coolmathgames.com/" + game.si 
							: "https://www.coolmathgames.com/sites/default/files/styles/og_image_game_page/public/" + game.og;
						createBox(imgSrc, game.title, `embed.html?t=2&id=${game.id}`);
					});
				} catch (error) {
					console.error(error);
				}
			}

			function load() {
				createBtn(0, "");
				createBtn(1, "WDBG");
				createBtn(2, "GN");
				createBtn(3, "CMG");
				loadBtn(1);
			}

			load();
		</script>
	</body>

</html>
