<!DOCTYPE html>
<html>
	<head>
		<title>WDB Games</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<!-- TODO: CREATE IN SCRIPT -->
		<div id="navbar" class="navbar"></div>
		<div id="container" class="container"></div>
		<script src="main.js"></script>
		<script>
			const global = {
				navbar: document.getElementById("navbar"),
				container: document.getElementById("container"),
				container: document.getElementById("container"),
				btnSelected: 0,
				btn: []
			}

			function createBtn(id, type, title) {
				global.btn[id] = document.createElement("button");
				global.btn[id].textContent = title;
				global.btn[id].classList.add("button");
				global.btn[id].onclick = () => {
					if(global.btnSelected !== id) {
						loadBtn(id);
					}
				}
				global.navbar.appendChild(global.btn[id]);
			}

			function loadBtn(id) {
				console.log(id)
				global.container.innerHTML = null;
				global.btnSelected = id;
				global.btn[id].classList.add("active");
				for(let i = 0; i < global.btn.length; ++i) {
					if(global.btnSelected !== i) {
						global.btn[i].classList.remove("active");
					}
				}

				if(id === 0) {
					global.container.classList.remove("settings");
					global.container.classList.add("settings-container");
				} else {
					global.container.classList.remove("settings-container");
					global.container.classList.add("settings");
				}
				
				switch(id) {
					case 0:
						loadSettings();
						break;
					case 1:
						loadWDBG();
						break;
					case 2:
						loadGN();
						break;
					case 3:
						loadCMG();
						break;
				}
			}

			function createBox(imgSrc, name, url) {
				const box = document.createElement("div");
				box.className = "box";

				const img = document.createElement("img");
				img.loading = "lazy";
				img.src = imgSrc;
				img.onerror = () => {
					img.src = "images/error.png";
				}
				box.appendChild(img);
				
				const a = document.createElement("a");
				a.textContent = name;
				a.href = url;
				a.target = "_blank";
				box.appendChild(a);
				
				global.container.appendChild(box);
			}

			function createSetting(name, item, placeholder) {
				const setting = document.createElement("div");
				setting.className = "setting";

				const title = document.createElement("p");
				title.textContent = name;
				setting.appendChild(title);

				const input = document.createElement("input");
				input.placeholder = placeholder;
				input.id = "item";
				setting.appendChild(input);

				global.container.appendChild(setting);
			}

			function load() {
				createBtn(1, 0, "WDBG");
				createBtn(2, 0, "GN");
				createBtn(3, 0, "CMG");
				createBtn(0, 1, "Settings");
				loadBtn(0);
			}

			async function loadSettings() {
				const response = await fetch("settings.json");
				const settings = await response.json();

				settings.forEach(setting => {
					createSetting(setting.name, setting.item, localStorage.getItem(setting.item) || setting.placeholder);
				});

				const button = document.createElement("button");
				button.className = "button";
				button.textContent = "Save Settings";

				button.onclick = () => {
					settings.forEach(setting => {
						localStorage.setItem(setting.item, document.getElementById(setting.name).value);
					});
				};

				global.container.appendChild(button);
			}

			async function loadWDBG() {
				fetch("embed.json")
					.then(response => response.json())
					.then(data => {
						data.forEach(box => {
							createBox(`images/${box.id}.png`, box.title, `embed.html?t=0&id=${box.id}`);
						});
					})
					.catch(error => console.error(error));
			}

			async function loadGN() {
				try {
					const response = await fetch("https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json");
					const zones = await response.json();
					zones.forEach(zone => {
						const imgSrc = zone.cover.replace("{COVER_URL}", "https://cdn.jsdelivr.net/gh/gn-math/covers@main");
						createBox(imgSrc, zone.name, `embed.html?t=1&id=${zone.id}`)
					});
				} catch (error) {
					console.error(error);
				}
			}

			async function loadCMG() {
				const popular = false;

				try {
					const response = await fetch("cmatgame_games_with_levels.json");
					const data = await response.json();
					
					let games = [];
					if(popular) {
						let ids = [
							...data.trendy,
							...data.top9,
						]
						ids = [...new Set(ids)];

						games = ids.map((id) => data.game.find((game) => game.id == id));
					} else {
						for(let i = 0; i < data.game.length; ++i) {
							games.push(data.game[i]);
						}
					}
						
					games.forEach(game => {
						let imgSrc;
						if(game.si) {
							imgSrc = "https://www.coolmathgames.com/" + game.si;
						} else {
							imgSrc = "https://www.coolmathgames.com/sites/default/files/styles/og_image_game_page/public/" + game.og;
						}

						createBox(imgSrc, game.title, `embed.html?t=2&id=${game.id}`);
					});
				} catch (error) {
					console.error(error);
				}
			}

			load();
		</script>
	</body>

</html>
