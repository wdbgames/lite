<!DOCTYPE html>
<html>
	<head>
		<title>WDB Games</title>
		<style>
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				background: black;
			}
			iframe {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
			#zoneViewer {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				z-index: 1000;
				flex-direction: column;
			}
			#zoneFrame {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
		</style>
	</head>
	
	<body>
		<iframe id="frame"></iframe>
		<script src="main.js"></script>
		<script>
			const global = {
				frame: document.getElementById("frame"),
				params: new URLSearchParams(window.location.search),
				type: null,
				id: null
			}

			function load() {
				global.type = Number(global.params.get("t"));
				global.id = Number(global.params.get("id"));

				switch(global.type) {
					case 0:
						loadWDBG();
						break;
					case 1:
						loadGN();
						break;
					case 2:
						loadCMG();
						break;
				}
			}

			function loadWDBG() {
				fetch("embed.json").then(response => response.json()).then(data => {
					const game = data.find(game => game.id == global.id);
					global.frame.src = game?.link;
				}).catch(error => {
					console.error(error);
				});
			}

			async function loadGN() {
				const zonesURL = "https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json";
				const coverURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/covers@main";
				const htmlURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/html@main";
				
				let zoneViewer = document.createElement("div");
				zoneViewer.id = "zoneViewer";
				document.body.appendChild(zoneViewer);
				
				const response = await fetch(zonesURL + "?t=" + Date.now());
				const data = await response.json();
				const zone = data.find(zone => zone.id == global.id);
				if(zone.url.startsWith("http")) {
					window.open(zone.url, "_blank");
				} else {
					const url = zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
					fetch(url + "?t=" + Date.now()).then(response => response.text()).then(html => {
						global.frame.sandbox = "allow-scripts allow-same-origin allow-forms";
						zoneViewer.appendChild(global.frame);
						global.frame.contentDocument.open();
						global.frame.contentDocument.write(html);
						global.frame.contentDocument.close();
						global.frame.style.display = "block";
						try {
							const url = new URL(window.location);
							url.searchParams.set("id", zone.id);
							history.pushState(null, "", url.toString());
						} catch(error) {
							console.error(error);
						}

					}).catch(error => {
						console.error(error);
						alert(error);
					});
				}
			}

			async function loadCMG() {
				const response = await fetch("cmatgame_games_with_levels.json");
				const data = await response.json();
				const game = data.game.find(game => game.id == global.id);

				try {
					const url = "https://www.coolmathgames.com/0-" + game.alias + "/play";
					if(url == null) {
						throw new Error();
					}

					const urlResponse = await fetch(url);
					if (!urlResponse.ok) {
						throw new Error();
					}

					const html = await urlResponse.text();
					const parser = new DOMParser();
					const doc = parser.parseFromString(html, "text/html");
					const base = doc.querySelector("base");
					if (!base) {
						throw new Error();
					}
					
					const baseHref = base.getAttribute("href");
					const path = baseHref.startsWith("http") ? baseHref : "https:" + baseHref;
					global.frame.src = path + "index.html";
				} catch(error) {
					console.warn(error);
					global.frame.src = "https://" + game.alias + ".coolmathgames.com";
				}
			}

			load();
		</script>
	</body>
</html>
