<!DOCTYPE html>
<html>
	<head>
		<title>WDB Games</title>
		<style>
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
			}
			iframe {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
			#zoneViewer {
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				z-index: 1000;
				flex-direction: column;
				background: #000;
			}
			#zoneFrame {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				border: none;
				display: block;
			}
		</style>
	</head>
	
	<body>
		<iframe id="frame"></iframe>
		<script>
			const params = new URLSearchParams(window.location.search);
			const type = Number(params.get("t"));
			const id = Number(params.get("id"));

			switch(type) {
				case 0:
					loadWDBG();
					break;
				case 1:
					loadGN();
					break;
				case 2:
					loadCMG();
					break;
			}

			function loadWDBG() {
				const frame = document.getElementById("frame");
				fetch("json/wdbg.json").then(res => res.json()).then(data => {
					const game = data.find(game => game.id == id);
					frame.src = game?.link;
				}).catch(error => {
					console.error(error);
				});
			}

			async function loadGN() {
				const zonesURL = "https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json";
				const coverURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/covers@main";
				const htmlURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/html@main";
				
				let zoneViewer = document.createElement("div");
				zoneViewer.id = "zoneViewer";
				document.body.appendChild(zoneViewer);

				let zoneFrame = document.getElementById("frame");
				
				const response = await fetch(zonesURL + "?t=" + Date.now());
				const data = await response.json();
				const zone = data.find(zone => zone.id == id);
				if(zone.url.startsWith("http")) {
					window.open(zone.url, "_blank");
				} else {
					const url = zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
					fetch(url + "?t=" + Date.now()).then(response => response.text()).then(html => {
						zoneFrame = document.createElement("iframe");
						zoneViewer.appendChild(zoneFrame);
						zoneFrame.contentDocument.open();
						zoneFrame.contentDocument.write(html);
						zoneFrame.contentDocument.close();
						zoneViewer.style.display = "block";
						try {
							const url = new URL(window.location);
							url.searchParams.set("id", zone.id);
							history.pushState(null, "", url.toString());
						} catch(error) {
							console.error(error);
						}

					}).catch(error => {
						console.error(error);
						alert(error);
					});
				}
			}

			async function loadCMG() {
				const frame = document.getElementById("frame");
				const response = await fetch("json/cmatgame_games_with_levels.json");
				const data = await response.json();
				const game = data.game.find(game => game.id == id);

				try {
					const url = "https://www.coolmathgames.com/0-" + game.alias + "/play";
					const urlResponse = await fetch(url);
					if (!urlResponse.ok) {
						throw new Error();
					}

					const html = await urlResponse.text();
					const parser = new DOMParser();
					const doc = parser.parseFromString(html, "text/html");
					const base = doc.querySelector("base");
					if (!base) {
						throw new Error();
					}
					
					const baseHref = base.getAttribute("href");
					const path = baseHref.startsWith("http") ? baseHref : "https:" + baseHref;
					frame.src = path + "index.html";
				} catch(error) {
					console.warn(error);
					try {
						frame.src = "https://" + game.alias + "1.coolmathgames.com";
					} catch(error) {
						console.error(error);
						alert(error);
					}
				}
			}
		</script>
	</body>
</html>
